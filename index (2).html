<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WL Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1e1e1e;
      --border-focus: #333;
      --text: #e8e8e8;
      --muted: #444;
      --muted2: #666;
      --green: #22c55e;
      --green-dim: #16a34a22;
      --red: #ef4444;
      --red-dim: #dc262622;
      --accent: #e8e8e8;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 20px 40px;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--muted2);
      font-weight: 300;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    /* ─── Input box ─── */
    .search-wrap {
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .input-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s;
      background: var(--surface);
    }

    .input-row:focus-within {
      border-color: var(--border-focus);
    }

    .prompt {
      padding: 0 14px;
      display: flex;
      align-items: center;
      color: var(--muted2);
      font-size: 12px;
      user-select: none;
      border-right: 1px solid var(--border);
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 14px 16px;
    }

    input::placeholder { color: var(--muted); }

    button {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted2);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 0 20px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      text-transform: uppercase;
    }

    button:hover { color: var(--text); background: #1a1a1a; }
    button:active { background: #222; }

    .hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      padding-left: 4px;
      letter-spacing: 0.03em;
    }

    /* ─── Results ─── */
    #results {
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      align-items: start;
      animation: slideIn 0.25s ease both;
    }

    .result-card.ok  { border-left: 3px solid var(--green); background: linear-gradient(90deg, var(--green-dim), transparent 60%); }
    .result-card.bad { border-left: 3px solid var(--red);   background: linear-gradient(90deg, var(--red-dim),   transparent 60%); }

    .rc-query {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rc-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      justify-self: end;
      align-self: center;
    }

    .ok  .rc-badge { background: var(--green-dim); color: var(--green); border: 1px solid #16a34a55; }
    .bad .rc-badge { background: var(--red-dim);   color: var(--red);   border: 1px solid #dc262655; }

    .rc-meta {
      font-size: 11px;
      color: var(--muted2);
      grid-column: 1 / -1;
    }

    .rc-meta span { color: var(--muted); margin-right: 4px; }

    /* ─── Loader ─── */
    .loader {
      display: none;
      width: 100%;
      max-width: 560px;
      margin-top: 16px;
      text-align: center;
      color: var(--muted2);
      font-size: 11px;
      letter-spacing: 0.1em;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader.visible { display: block; }

    /* ─── Error ─── */
    .error-msg {
      background: var(--red-dim);
      border: 1px solid #dc262633;
      color: var(--red);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 11px;
      animation: slideIn 0.2s ease both;
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ─── Footer ─── */
    footer {
      margin-top: auto;
      padding-top: 48px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">uzuk.pro · api</div>
  <h1>WL <span>/</span> Checker</h1>
  <p class="subtitle">проверка IP · домена · диапазона</p>
</header>

<div class="search-wrap">
  <div class="input-row">
    <div class="prompt">$</div>
    <input id="queryInput" type="text" placeholder="8.8.8.8 / ya.ru / 192.168.1.0/24" autocomplete="off" spellcheck="false" />
    <button id="checkBtn">Check</button>
  </div>
  <p class="hint">поддерживается: одиночный IP, домен, CIDR-диапазон (до 32 хостов)</p>
</div>

<div class="loader" id="loader">CHECKING...</div>
<div id="results"></div>

<footer>powered by api.uzuk.pro</footer>

<script>
  const API = 'http://api.uzuk.pro/check';
  const input = document.getElementById('queryInput');
  const btn   = document.getElementById('checkBtn');
  const results = document.getElementById('results');
  const loader  = document.getElementById('loader');

  async function checkOne(query) {
    const r = await fetch(`${API}?query=${encodeURIComponent(query)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function renderCard(data) {
    const ok = data.whitelisted;
    const card = document.createElement('div');
    card.className = `result-card ${ok ? 'ok' : 'bad'}`;
    card.innerHTML = `
      <div class="rc-query">${data.query}</div>
      <div class="rc-badge">${ok ? 'Whitelist ✓' : 'Not listed'}</div>
      <div class="rc-meta">
        <span>ip</span>${data.ip || '—'}
        &nbsp;&nbsp;<span>asn</span>${data.asn || '—'}
        &nbsp;&nbsp;<span>cc</span>${data.country || '—'}
      </div>`;
    results.prepend(card);
  }

  function renderError(msg) {
    const el = document.createElement('div');
    el.className = 'error-msg';
    el.textContent = `Ошибка: ${msg}`;
    results.prepend(el);
  }

  function expandCIDR(cidr) {
    try {
      const [base, prefix] = cidr.split('/');
      const p = parseInt(prefix);
      if (isNaN(p) || p < 24) return null; // limit: /24 and smaller
      const parts = base.split('.').map(Number);
      const baseInt = (parts[0]<<24)|(parts[1]<<16)|(parts[2]<<8)|parts[3];
      const count = Math.min(Math.pow(2, 32-p), 32);
      const ips = [];
      for (let i = 1; i < count - 1 && ips.length < 32; i++) {
        const n = baseInt + i;
        ips.push([(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.'));
      }
      return ips.length ? ips : null;
    } catch { return null; }
  }

  async function run() {
    const q = input.value.trim();
    if (!q) return;

    results.innerHTML = '';
    loader.classList.add('visible');
    btn.disabled = true;

    try {
      if (q.includes('/')) {
        const ips = expandCIDR(q);
        if (!ips) { renderError('Диапазон слишком большой (минимум /24) или некорректный CIDR'); return; }
        for (const ip of ips) {
          try { renderCard(await checkOne(ip)); }
          catch(e) { renderError(`${ip}: ${e.message}`); }
        }
      } else {
        renderCard(await checkOne(q));
      }
    } catch(e) {
      renderError(e.message);
    } finally {
      loader.classList.remove('visible');
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', run);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
</script>
</body>
</html>
